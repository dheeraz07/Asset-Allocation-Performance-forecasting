<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 840" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.18"/>
    </filter>
    <style>
      .title    { font-size: 20px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 12px; fill: #64748b; }
      .lane     { font-size: 12px; font-weight: 700; fill: #475569; letter-spacing: 0.06em; }
      .label    { font-size: 13px; font-weight: 600; fill: #0f172a; text-anchor: middle; }
      .sub      { font-size: 11px; fill: #475569; text-anchor: middle; }
      .arrow    { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .arrowDash{ stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 4 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text class="title"    x="40" y="38">Asset Allocation Performance Forecasting</text>
  <text class="subtitle" x="40" y="58">End-to-end pipeline from raw CSVs to leaderboard submission</text>

  <text class="lane" x="40"   y="95">DATA</text>
  <text class="lane" x="290"  y="95">FEATURES</text>
  <text class="lane" x="620"  y="95">BASE MODELS</text>
  <text class="lane" x="960"  y="95">STACK AND SUBMIT</text>

  <g filter="url(#shadow)">
    <rect x="40" y="120" width="200" height="60" rx="10" ry="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.2"/>
    <text class="label" x="140" y="148">Raw CSVs</text>
    <text class="sub"   x="140" y="165">X_train, X_test, y_train</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="280" y="120" width="260" height="70" rx="10" ry="10" fill="#ecfeff" stroke="#0891b2" stroke-width="1.2"/>
    <text class="label" x="410" y="148">01_features_engineering.py</text>
    <text class="sub"   x="410" y="165">point, window, cross-sectional</text>
    <text class="sub"   x="410" y="180">output: v2 parquet</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="280" y="220" width="260" height="70" rx="10" ry="10" fill="#ecfeff" stroke="#0891b2" stroke-width="1.2"/>
    <text class="label" x="410" y="248">02_features_continuous_te.py</text>
    <text class="sub"   x="410" y="265">OOF continuous target encoding</text>
    <text class="sub"   x="410" y="280">output: v3 parquet</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="280" y="520" width="260" height="70" rx="10" ry="10" fill="#ecfeff" stroke="#0891b2" stroke-width="1.2"/>
    <text class="label" x="410" y="548">03_features_calibration_bias.py</text>
    <text class="sub"   x="410" y="565">per-allocation stack-bias feature</text>
    <text class="sub"   x="410" y="580">output: v7 parquet</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="600" y="140" width="260" height="56" rx="10" ry="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/>
    <text class="label" x="730" y="163">04_lgbm_cv_oof.py</text>
    <text class="sub"   x="730" y="182">LightGBM on v3 + fold-wise TE</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="600" y="208" width="260" height="56" rx="10" ry="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/>
    <text class="label" x="730" y="231">05_xgb_cv_oof.py</text>
    <text class="sub"   x="730" y="250">XGBoost on v2 + fold-wise TE</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="600" y="276" width="260" height="56" rx="10" ry="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/>
    <text class="label" x="730" y="299">06_catboost_cv_oof.py</text>
    <text class="sub"   x="730" y="318">CatBoost depth 8, native categoricals</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="600" y="344" width="260" height="56" rx="10" ry="10" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.2"/>
    <text class="label" x="730" y="367">07_mlp_bagged_cv_oof.py (v2)</text>
    <text class="sub"   x="730" y="386">embedding MLP, 8-seed bag</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="600" y="412" width="260" height="56" rx="10" ry="10" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.2"/>
    <text class="label" x="730" y="435">08_sequence_cnn_gru_cv_oof.py</text>
    <text class="sub"   x="730" y="454">conv1d + GRU over 20-day window</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="600" y="512" width="260" height="76" rx="10" ry="10" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.2" stroke-dasharray="5 3"/>
    <text class="label" x="730" y="538">07_mlp_bagged_cv_oof.py (v7)</text>
    <text class="sub"   x="730" y="556">same architecture, retrained on v7</text>
    <text class="sub"   x="730" y="572">gives mlp-bag8-biasfeature</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="920" y="250" width="280" height="80" rx="10" ry="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
    <text class="label" x="1060" y="280">09_final_stack_and_submit.py</text>
    <text class="sub"   x="1060" y="298">Ridge meta-learner (alpha = 1)</text>
    <text class="sub"   x="1060" y="314">per-allocation calibration</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="920" y="360" width="280" height="60" rx="10" ry="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
    <text class="label" x="1060" y="388">Per-GROUP threshold</text>
    <text class="sub"   x="1060" y="405">optimal / quantile-matched</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="920" y="450" width="280" height="70" rx="10" ry="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2"/>
    <text class="label" x="1060" y="478">submission_v5_final.csv</text>
    <text class="sub"   x="1060" y="495">submission_v5_conservative.csv</text>
    <text class="sub"   x="1060" y="510">six sub_probe_v5_*.csv probes</text>
  </g>

  <path class="arrow" d="M 240 150 L 278 150"/>
  <path class="arrow" d="M 410 190 L 410 220"/>

  <path class="arrow" d="M 540 255 C 580 255, 580 168, 598 168"/>
  <path class="arrow" d="M 540 255 C 580 255, 580 236, 598 236"/>
  <path class="arrow" d="M 540 255 C 580 280, 580 304, 598 304"/>
  <path class="arrow" d="M 540 255 C 580 320, 580 372, 598 372"/>
  <path class="arrow" d="M 540 255 C 580 360, 580 440, 598 440"/>

  <path class="arrow" d="M 860 168 C 895 168, 895 268, 918 268"/>
  <path class="arrow" d="M 860 236 C 895 236, 895 278, 918 278"/>
  <path class="arrow" d="M 860 304 C 895 304, 895 290, 918 290"/>
  <path class="arrow" d="M 860 372 C 895 372, 895 302, 918 302"/>
  <path class="arrow" d="M 860 440 C 895 440, 895 314, 918 314"/>

  <path class="arrow" d="M 1060 330 L 1060 360"/>
  <path class="arrow" d="M 1060 420 L 1060 450"/>

  <path class="arrowDash" d="M 920 320 C 720 320, 720 555, 540 555"/>
  <text x="660" y="475" fill="#475569" font-size="11">Ridge OOF bias</text>

  <path class="arrow" d="M 540 555 L 598 550"/>
  <path class="arrow" d="M 860 535 C 895 535, 895 325, 918 325"/>

  <g transform="translate(40, 640)">
    <text class="lane" x="0" y="0">LEGEND</text>
    <rect x="0"   y="15" width="16" height="12" rx="10" ry="10" fill="#ecfeff" stroke="#0891b2"/>
    <text x="22"  y="26" font-size="12" fill="#475569">Feature stage</text>

    <rect x="150" y="15" width="16" height="12" rx="10" ry="10" fill="#fef3c7" stroke="#d97706"/>
    <text x="172" y="26" font-size="12" fill="#475569">Tree-based base model</text>

    <rect x="330" y="15" width="16" height="12" rx="10" ry="10" fill="#e0e7ff" stroke="#4f46e5"/>
    <text x="352" y="26" font-size="12" fill="#475569">Neural base model</text>

    <rect x="500" y="15" width="16" height="12" rx="10" ry="10" fill="#dcfce7" stroke="#16a34a"/>
    <text x="522" y="26" font-size="12" fill="#475569">Stacking / calibration</text>

    <rect x="670" y="15" width="16" height="12" rx="10" ry="10" fill="#fef9c3" stroke="#ca8a04"/>
    <text x="692" y="26" font-size="12" fill="#475569">Artefacts / CSVs</text>

    <path class="arrow"     d="M 840 21 L 870 21"/>
    <text x="876" y="26" font-size="12" fill="#475569">forward</text>

    <path class="arrowDash" d="M 930 21 L 960 21"/>
    <text x="966" y="26" font-size="12" fill="#475569">post-stack feedback</text>
  </g>

  <text class="subtitle" x="40" y="720">All base models share GroupKFold(5) splits grouped by trading day.</text>
  <text class="subtitle" x="40" y="740">v7 is a second-pass feature matrix: the per-allocation bias learnt from the first Ridge stack is fed back as a feature so the MLP can pick up non-linear interactions around the correction.</text>
  <text class="subtitle" x="40" y="760">Final OOF accuracy 0.5293. Majority-class baseline 0.5072. Public leaderboard baseline 0.5352.</text>
  <text class="subtitle" x="40" y="795">Pinned seeds throughout; deterministic given input order of TS.</text>
</svg>
